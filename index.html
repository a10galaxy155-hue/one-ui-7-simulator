<div class="phone-frame">
  <div class="status-bar">
    <div class="time">12:45</div>
    <div class="icons">📶 🔋 100%</div>
  </div>

  <div class="home-screen">
    <div class="app-grid">
      <div class="app-icon" onclick="openApp('Gallery')">
        <div class="icon gallery"></div>
        <span>Gallery</span>
      </div>
      <div class="app-icon" onclick="openApp('Settings')">
        <div class="icon settings"></div>
        <span>Settings</span>
      </div>
      <div class="app-icon" onclick="openApp('Camera')">
        <div class="icon camera"></div>
        <span>Camera</span>
      </div>
    </div>
  </div>

  <div class="now-bar">
    <span class="pill">🎵 Now Playing: Galaxy Buds4 Pro</span>
  </div>

  <div id="control-center" class="panel">
    <h3>Quick Settings</h3>
    <div class="grid">
      <div class="toggle active">Wi-Fi</div>
      <div class="toggle">Bluetooth</div>
      <div class="toggle">AI Search</div>
    </div>
    <div class="slider">Brightness 🔅 ────────</div>
  </div>
</div>
